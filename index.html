    <!-- Globaalset root.innerHTML veakäsitlust ei kasutata: see rikuks Reacti DOMi

    <div id="root"></div>
    <noscript>

    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js" crossorigin="anonymous"></script>
    <script>
      window.__nmLoadCheck = function() {
        setTimeout(function() {
          var r = document.getElementById('root');
          if (r && !r.querySelector('*')) {
            r.innerHTML = '<div style="padding:24px;font-family:sans-serif;background:#fef3c7;color:#92400e;"><p><strong>Rakendus ei laadinud.</strong></p><p>Ava brauseri konsool (F12 → Console) ja vaata viga. Vercel/noodimeister.ee puhul võib olla vaja uuendada lehte või puhastada vahemälu.</p></div>';
          }
        }, 4000);
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', window.__nmLoadCheck);
      else window.__nmLoadCheck();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
