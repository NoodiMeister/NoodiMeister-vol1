<?xml version="1.0" encoding="UTF-8"?>
<!-- Väärtused: src/notation/TimeSignatureLayout.js. Numbrid: Leland SMuFL (U+E084), nagu rakenduses. Font: ../public/fonts/Leland.woff2 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 60" width="130" height="60">
  <defs>
    <style>
      @font-face { font-family: 'Leland'; src: url('../public/fonts/Leland.woff2') format('woff2'); }
    </style>
  </defs>
  <title>4/4 taktimoot – mõlemad variandid, Leland SMuFL (nagu rakenduses)</title>
  <desc>Vasakul: klassikaline 4/4. Paremal: pedagoogiline 4/4. Numbrid = Leland SMuFL. Paigutus = TimeSignatureLayout.js.</desc>
  <rect width="130" height="60" fill="#f8fafc"/>
  <!-- Klassikaline 4/4 -->
  <g transform="translate(35, 30)" fill="#333">
    <text x="0" y="-11" text-anchor="middle" font-family="Leland, sans-serif" font-size="18" dominant-baseline="alphabetic">&#xE084;</text>
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#333" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Leland, sans-serif" font-size="18" dominant-baseline="alphabetic">&#xE084;</text>
  </g>
  <!-- Pedagoogiline 4/4 (nr 4 ilma joonestuseta, nagu esimeses variandis) -->
  <g transform="translate(95, 30)" fill="#333" stroke="#333" stroke-width="1.5">
    <text x="0" y="-11" text-anchor="middle" font-family="Leland, sans-serif" font-size="18" dominant-baseline="alphabetic" stroke="none">&#xE084;</text>
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="1" cy="2.5" rx="4" ry="2.5" fill="#333"/>
    <line x1="-3" y1="3" x2="-3" y2="23" stroke="#333" stroke-width="1.5"/>
  </g>
</svg>
