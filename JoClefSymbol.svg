<?xml version="1.0" encoding="UTF-8"?>
<!-- Estonian JO-clef: 1st vertical 0-6, 2nd 15-21; upper horizontal 30-35, lower 45-50. Lines go through clef. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 53 80" width="53" height="80">
  <rect x="0" y="0" width="6" height="80" fill="#000"/>
  <rect x="15" y="0" width="6" height="80" fill="#000"/>
  <rect x="21" y="30" width="32" height="5" fill="#000"/>
  <rect x="21" y="45" width="32" height="5" fill="#000"/>
</svg>
