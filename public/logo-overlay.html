<!doctype html>
<html lang="et">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noodimeister Logo Overlay 3D</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      #logoWrap {
        position: relative;
        width: min(96vw, 1280px);
        aspect-ratio: 1024 / 558;
      }
      #bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
      }
      #clefStage {
        position: absolute;
        left: 40.8%;
        top: 8%;
        width: 18%;
        height: 56%;
        pointer-events: none;
        perspective: 900px;
      }
      #clefStage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="logoWrap">
        <img id="bg" src="/logo-overlay-bg.svg" alt="Noodimeister logo background" />
        <div id="clefStage" aria-hidden="true"></div>
      </div>
    </div>

    <script type="module">
      const stageEl = document.getElementById('clefStage');
      const bgEl = document.getElementById('bg');
      const cacheBust = new URLSearchParams(window.location.search).get('v');
      if (bgEl && cacheBust) bgEl.src = `/logo-overlay-bg.svg?v=${encodeURIComponent(cacheBust)}`;

      try {
        const [THREE, { SVGLoader }] = await Promise.all([
          import('https://esm.sh/three@0.160.0'),
          import('https://esm.sh/three@0.160.0/examples/jsm/loaders/SVGLoader.js')
        ]);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setClearColor(0x000000, 0);
        stageEl.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 10000);
        camera.position.set(0, 0, 820);

        const ambient = new THREE.AmbientLight(0xa8f8ff, 0.45);
        scene.add(ambient);
        const key = new THREE.DirectionalLight(0xffffff, 1.15);
        key.position.set(240, 280, 220);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0x62dcff, 0.65);
        fill.position.set(-240, 120, -260);
        scene.add(fill);
        const rimA = new THREE.DirectionalLight(0xb4f7ff, 0.5);
        rimA.position.set(0, 260, -340);
        scene.add(rimA);
        const rimB = new THREE.DirectionalLight(0xd8ffff, 0.35);
        rimB.position.set(320, -140, 120);
        scene.add(rimB);

        const spinPivot = new THREE.Group();
        scene.add(spinPivot);

        function centerGeometryAtOrigin(group) {
          const box = new THREE.Box3().setFromObject(group);
          const center = box.getCenter(new THREE.Vector3());
          group.traverse((obj) => {
            if (obj.isMesh && obj.geometry) obj.geometry.translate(-center.x, -center.y, -center.z);
          });
          group.position.set(0, 0, 0);
        }

        function thicknessPulse(sec, center, width) {
          const d = sec - center;
          return Math.exp(-(d * d) / (2 * width * width));
        }

        const durationSeconds = 5;
        let startAt = performance.now();
        let clefGroup = null;
        let baseFitScale = 1;
        let baseDepthWorld = 1;
        let clefMaterials = [];

        const CLEF_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 321.38 887.51"><path d="m2002 7851c-61 17-116 55-167 113-51 59-76 124-76 194 0 44 15 94 44 147 29 54 73 93 130 118 19 4 28 14 28 28 0 5-7 10-24 14-91-23-166-72-224-145-58-74-88-158-90-254 3-103 34-199 93-287 60-89 137-152 231-189l-69-355c-154 128-279 261-376 401-97 139-147 290-151 453 2 73 17 144 45 212 28 69 70 131 126 188 113 113 260 172 439 178 61-4 126-15 196-33l-155-783zm72-10l156 769c154-62 231-197 231-403-9-69-29-131-63-186-33-56-77-100-133-132s-119-48-191-48zm-205-1040c33-20 71-55 112-104 41-48 81-105 119-169 39-65 70-131 93-198 23-66 34-129 34-187 0-25-2-50-7-72-4-36-15-64-34-83-19-18-43-28-73-28-60 0-114 37-162 111-37 64-68 140-90 226-23 87-36 173-38 260 5 99 21 180 46 244zm-63 58c-45-162-70-327-75-495 1-108 12-209 33-303 20-94 49-175 87-245 37-70 80-123 128-159 43-32 74-49 91-49 13 0 24 5 34 14s23 24 39 44c119 169 179 373 179 611 0 113-15 223-45 333-29 109-72 213-129 310-58 98-126 183-205 256l81 394c44-5 74-9 91-9 76 0 144 16 207 48s117 75 161 130c44 54 78 116 102 186 23 70 36 143 36 219 0 118-31 226-93 323s-155 168-280 214c8 49 22 120 43 211 20 92 35 165 45 219s14 106 14 157c0 79-19 149-57 211-39 62-91 110-157 144-65 34-137 51-215 51-110 0-206-31-288-92-82-62-126-145-130-251 3-47 14-91 34-133s47-76 82-102c34-27 75-41 122-44 39 0 76 11 111 32 34 22 62 51 83 88 20 37 31 78 31 122 0 59-20 109-60 150s-91 62-152 62h-23c39 60 103 91 192 91 45 0 91-10 137-28 47-19 86-44 119-76s55-66 64-102c17-41 25-98 25-169 0-48-5-96-14-144-9-47-23-110-42-188-19-77-33-137-41-178-60 15-122 23-187 23-109 0-212-22-309-67s-182-107-256-187c-73-80-130-170-171-272-40-101-61-207-62-317 4-102 23-200 59-292 36-93 82-181 139-263s116-157 177-224c62-66 143-151 245-254z"/></svg>`;

        function buildClef() {
          const parsed = new SVGLoader().parse(CLEF_SVG);
          const group = new THREE.Group();
          clefMaterials = [];
          for (const path of parsed.paths) {
            const shapes = SVGLoader.createShapes(path);
            for (const shape of shapes) {
              const geo = new THREE.ExtrudeGeometry(shape, {
                depth: 26,
                bevelEnabled: true,
                bevelThickness: 2.4,
                bevelSize: 1.4,
                bevelSegments: 3,
                curveSegments: 20
              });
              geo.computeVertexNormals();
              const mat = new THREE.MeshPhysicalMaterial({
                color: 0x7fefff,
                emissive: 0x16444e,
                emissiveIntensity: 0.28,
                metalness: 0.34,
                roughness: 0.2,
                clearcoat: 0.9,
                clearcoatRoughness: 0.12,
                sheen: 0.55,
                sheenRoughness: 0.3,
                specularIntensity: 1,
                iridescence: 0.18,
                iridescenceIOR: 1.3,
                side: THREE.DoubleSide
              });
              mat.userData.baseEmissiveIntensity = mat.emissiveIntensity;
              mat.userData.baseSpecularIntensity = mat.specularIntensity;
              clefMaterials.push(mat);
              group.add(new THREE.Mesh(geo, mat));
            }
          }

          const box = new THREE.Box3().setFromObject(group);
          const size = box.getSize(new THREE.Vector3());
          centerGeometryAtOrigin(group);
          const fit = 180 / Math.max(size.x || 1, size.y || 1);
          group.scale.set(fit, -fit, fit);
          baseFitScale = fit;
          spinPivot.add(group);
          clefGroup = group;

          const sphere = new THREE.Box3().setFromObject(group).getBoundingSphere(new THREE.Sphere());
          const fovRad = (camera.fov * Math.PI) / 180;
          const distance = (sphere.radius / Math.sin(fovRad / 2)) * 1.2;
          camera.position.set(0, 0, distance);
          camera.lookAt(0, 0, 0);
          baseDepthWorld = Math.max(0.0001, new THREE.Box3().setFromObject(group).getSize(new THREE.Vector3()).z);
        }

        function resize() {
          const w = Math.max(stageEl.clientWidth, 1);
          const h = Math.max(stageEl.clientHeight, 1);
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        }

        function render(now) {
          if (!clefGroup) return;
          const sec = ((now - startAt) / 1000) % durationSeconds;
          const angle = ((sec / durationSeconds) * 360) % 360;
          spinPivot.rotation.y = angle * Math.PI / 180;

          const pulse = thicknessPulse(sec, 1.2, 0.18) + thicknessPulse(sec, 3.7, 0.18);
          const edgePulse = thicknessPulse(sec, 0.0, 0.3) + thicknessPulse(sec, durationSeconds, 0.3);
          const stageHeight = Math.max(stageEl.clientHeight, 1);
          const fovRad = (camera.fov * Math.PI) / 180;
          const worldPerPixel = (2 * Math.tan(fovRad / 2) * camera.position.z) / stageHeight;
          const targetExtraDepthWorld = 10 * worldPerPixel;
          const zFactor = 1 + (targetExtraDepthWorld / baseDepthWorld) * Math.min(1, pulse);
          clefGroup.scale.set(baseFitScale, -baseFitScale, baseFitScale * zFactor);

          const edgeBoost = Math.min(1, edgePulse);
          key.intensity = 1.15 + edgeBoost * 1.1;
          fill.intensity = 0.65 + edgeBoost * 0.55;
          rimA.intensity = 0.5 + edgeBoost * 0.95;
          rimB.intensity = 0.35 + edgeBoost * 0.75;
          for (const mat of clefMaterials) {
            mat.emissiveIntensity = mat.userData.baseEmissiveIntensity + edgeBoost * 0.95;
            mat.clearcoat = 1;
            mat.specularIntensity = Math.min(2.2, mat.userData.baseSpecularIntensity + edgeBoost * 1.25);
            mat.sheen = Math.min(1, 0.55 + edgeBoost * 0.4);
          }

          renderer.render(scene, camera);
        }

        buildClef();
        resize();
        window.addEventListener('resize', resize);
        function loop(now) {
          render(now);
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      } catch (err) {
        console.error('logo-overlay three.js init failed', err);
      }
    </script>
  </body>
</html>
