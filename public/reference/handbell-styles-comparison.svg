<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" role="img" aria-label="Four handbell icon variants plus separate simple asset">
  <defs>
    <style>
      .label { font-family: "Noto Sans", Arial, sans-serif; font-size: 13px; fill: #374151; font-weight: 600; }
      .sub { font-family: "Noto Sans", Arial, sans-serif; font-size: 11px; fill: #6b7280; }
      .title { font-family: "Noto Sans", Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
    </style>
  </defs>
  <rect width="640" height="220" fill="#fafafa"/>
  <text x="24" y="28" class="title">Neljast k&#228;sikella kujutist (v&#245;rdlus)</text>
  <text x="24" y="48" class="sub">Lihtne variant eraldi: kasikella-kujutis/kasikella-kujutis.svg</text>
  <text x="24" y="64" class="sub">See fail: public/reference/handbell-styles-comparison.svg</text>

  <!-- 1: Noodimeister HandbellIcon -->
  <g transform="translate(40, 72)">
    <text x="0" y="-8" class="label">1 &#8212; Noodimeister (toode)</text>
    <text x="0" y="6" class="sub">Sang &#8776; kell; lainelised k&#252;ljed</text>
    <g transform="translate(70, 100) scale(2.2) translate(-12, -12)">
      <rect x="9" y="0.55" width="6" height="10.5" rx="0.45" ry="0.45" fill="#141414" stroke="#5c2d0e" stroke-width="0.5"/>
      <path d="M 9 11.05 L 15 11.05 C 17 13.1 19 14.55 19.25 16.55 C 19.5 18.2 18.5 19.3 17.8 19.65 Q 12 21.35 6.2 19.65 C 5.5 19.3 4.5 18.2 4.75 16.55 C 5 14.55 7 13.1 9 11.05 Z" fill="#f59e0b" stroke="#5c2d0e" stroke-width="1.08" stroke-linejoin="round"/>
      <ellipse cx="7.15" cy="15.2" rx="1.65" ry="3.05" fill="rgba(255,255,255,0.36)"/>
      <circle cx="12" cy="19.4" r="1.35" fill="#5c2d0e"/>
    </g>
  </g>

  <!-- 2: wide dome -->
  <g transform="translate(180, 72)">
    <text x="0" y="-8" class="label">2 &#8212; Lai kuppel</text>
    <text x="0" y="6" class="sub">&#220;maram, l&#252;hike sang</text>
    <g transform="translate(70, 100) scale(2.2) translate(-12, -12)">
      <path d="M 12 1.8 L 10.5 4.5 L 13.5 4.5 Z" fill="none" stroke="#4a3728" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M 12 4.8 C 6.5 4.8 4 9.5 4.5 14 C 5 18 8 20.5 12 21 C 16 20.5 19 18 19.5 14 C 20 9.5 17.5 4.8 12 4.8 Z" fill="#eab308" stroke="#4a3728" stroke-width="1.1" stroke-linejoin="round"/>
      <ellipse cx="10" cy="12" rx="2.4" ry="4" fill="rgba(255,255,255,0.4)"/>
      <ellipse cx="12" cy="19.2" rx="5.5" ry="1.2" fill="none" stroke="#4a3728" stroke-width="0.9"/>
      <circle cx="12" cy="17.8" r="1.6" fill="#4a3728"/>
    </g>
  </g>

  <!-- 3: was 4 side view -->
  <g transform="translate(320, 72)">
    <text x="0" y="-8" class="label">3 &#8212; K&#252;lgvaade</text>
    <text x="0" y="6" class="sub">Pikem sang, kooniline korpus</text>
    <g transform="translate(70, 100) scale(2.2) translate(-12, -12)">
      <path d="M 8 3 Q 12 1 16 3 L 16 5 L 8 5 Z" fill="none" stroke="#3f2c1a" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M 9 5 L 7 17 Q 12 20.5 15 17 L 15 5 Z" fill="#a855f7" stroke="#3f2c1a" stroke-width="1.1" stroke-linejoin="round"/>
      <path d="M 8 16 Q 12 18.5 16 16" fill="none" stroke="#3f2c1a" stroke-width="0.95"/>
      <circle cx="12" cy="17.5" r="1.5" fill="#3f2c1a"/>
      <ellipse cx="10" cy="10" rx="1.8" ry="3.5" fill="rgba(255,255,255,0.35)"/>
    </g>
  </g>

  <!-- 4: was 5 white handle -->
  <g transform="translate(460, 72)">
    <text x="0" y="-8" class="label">4 &#8212; Valge sang</text>
    <text x="0" y="6" class="sub">Sama korpus mis nr 1</text>
    <g transform="translate(70, 100) scale(2.2) translate(-12, -12)">
      <rect x="9" y="0.55" width="6" height="10.5" rx="0.45" ry="0.45" fill="#f3f4f6" stroke="#374151" stroke-width="0.65"/>
      <path d="M 9 11.05 L 15 11.05 C 17 13.1 19 14.55 19.25 16.55 C 19.5 18.2 18.5 19.3 17.8 19.65 Q 12 21.35 6.2 19.65 C 5.5 19.3 4.5 18.2 4.75 16.55 C 5 14.55 7 13.1 9 11.05 Z" fill="#22c55e" stroke="#166534" stroke-width="1.08" stroke-linejoin="round"/>
      <ellipse cx="7.15" cy="15.2" rx="1.65" ry="3.05" fill="rgba(255,255,255,0.35)"/>
      <circle cx="12" cy="19.4" r="1.35" fill="#166534"/>
    </g>
  </g>
</svg>
