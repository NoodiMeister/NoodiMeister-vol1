<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28" role="img" aria-label="K&#228;sikella kujutis, lihtne">
  <title>K&#228;sikella kujutis (lihtne)</title>
  <desc>
    Must sang: ristk&#252;lik; valge vaheriba. Kellakeha: &#252;laserv &#252;mar ja kitsas;
    vasak/parem k&#252;lg lainelised bezierid, keskosas v&#228;ljapoole laienev.
  </desc>
  <rect
    x="10"
    y="3"
    width="4"
    height="10"
    rx="0.35"
    ry="0.35"
    fill="#1f2937"
  />
  <!-- Valge vaheriba sang ja kella vahel -->
  <rect x="4" y="13" width="16" height="0.5" fill="#ffffff" />
  <!-- Kellakeha: Q-&#252;mar &#252;laserv; C-k&#252;ljed lainelise laienemisega; Q alumine kaar -->
  <path
    d="M 10 13.5 Q 12 13.05 14 13.5
       C 14.5 14.8 17 16 18.5 18.5
       C 19.2 20.5 18.8 22 18 23.5
       Q 12 25.8 6 23.5
       C 5.2 22 4.8 20.5 5.5 18.5
       C 6.2 16 8.5 14.8 10 13.5 Z"
    fill="#f97316"
    stroke="#1f2937"
    stroke-width="1.15"
    stroke-linejoin="round"
  />
  <line x1="5.45" y1="22" x2="18.55" y2="22" stroke="#1f2937" stroke-width="1"/>
  <circle cx="12" cy="23.2" r="1.35" fill="#1f2937"/>
</svg>
