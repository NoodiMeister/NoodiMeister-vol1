  <text x="48" y="360" class="subtitle">Legend:</text>
  <text x="48" y="386" class="lyric">- Icon = HandbellIcon component (same paths as scorepage)</text>
  <text x="48" y="408" class="lyric">- Vertical position = pitch on staff</text>
  <text x="48" y="430" class="lyric">- Fill = school handbell color (example palette)</text>
</svg>
