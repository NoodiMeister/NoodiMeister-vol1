    <ellipse cx="0" cy="200" rx="1.5" ry="1.5" fill="#111827"/>
    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#6366f1" color="#6366f1" transform="translate(0,140) scale(1.15) translate(-12,-12)"/>
  </g>

  <g transform="translate(1080,0)">
    <line x1="0" y1="245" x2="0" y2="185" stroke="#111827" stroke-width="2"/>
    <ellipse cx="0" cy="245" rx="1.5" ry="1.5" fill="#111827"/>
    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#ec4899" color="#ec4899" transform="translate(0,185) scale(1.15) translate(-12,-12)"/>
  </g>
  <g transform="translate(1150,0)">
