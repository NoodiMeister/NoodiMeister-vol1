<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="Handbells notation example">
  <defs>
    <style>
      .title { font-family: "Noto Sans", Arial, sans-serif; font-size: 26px; fill: #1f2937; font-weight: 700; }
      .subtitle { font-family: "Noto Sans", Arial, sans-serif; font-size: 16px; fill: #4b5563; }
      .staff { stroke: #111827; stroke-width: 2; }
      .bar { stroke: #111827; stroke-width: 3; }
      .timesig { font-family: "Noto Sans", Arial, sans-serif; font-size: 44px; fill: #111827; font-weight: 700; }
      .lyric { font-family: "Noto Sans", Arial, sans-serif; font-size: 13px; fill: #374151; }
    </style>
    <!-- Sama siluet mis src/components/icons/HandbellIcon.jsx — korpus currentColor, sang tumedam -->
    <symbol id="handbell-note" viewBox="0 0 24 24">
      <rect x="9" y="0.55" width="6" height="10.5" rx="0.45" ry="0.45" fill="#141414" stroke="#5c2d0e" stroke-width="0.5"/>
      <path
        d="M 9 11.05 L 15 11.05 C 17 13.1 19 14.55 19.25 16.55 C 19.5 18.2 18.5 19.3 17.8 19.65 Q 12 21.35 6.2 19.65 C 5.5 19.3 4.5 18.2 4.75 16.55 C 5 14.55 7 13.1 9 11.05 Z"
        fill="currentColor"
        stroke="#5c2d0e"
        stroke-width="1.08"
        stroke-linejoin="round"
      />
      <ellipse cx="7.15" cy="15.2" rx="1.65" ry="3.05" fill="rgba(255,255,255,0.36)"/>
      <circle cx="12" cy="19.4" r="1.35" fill="#5c2d0e"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1280" height="520" fill="#ffffff"/>
  <text x="48" y="52" class="title">Handbells notation example (pedagogical visual)</text>
  <text x="48" y="82" class="subtitle">Handbell silhouette matches in-app HandbellIcon (24×24, scaled).</text>

  <!-- Staff -->
  <line x1="48" y1="170" x2="1232" y2="170" class="staff"/>
  <line x1="48" y1="200" x2="1232" y2="200" class="staff"/>
  <line x1="48" y1="230" x2="1232" y2="230" class="staff"/>
  <line x1="48" y1="260" x2="1232" y2="260" class="staff"/>
  <line x1="48" y1="290" x2="1232" y2="290" class="staff"/>

  <!-- Bar lines -->
  <line x1="110" y1="170" x2="110" y2="290" class="bar"/>
  <line x1="410" y1="170" x2="410" y2="290" class="bar"/>
  <line x1="710" y1="170" x2="710" y2="290" class="bar"/>
  <line x1="1010" y1="170" x2="1010" y2="290" class="bar"/>
  <line x1="1232" y1="170" x2="1232" y2="290" class="bar"/>

  <!-- Time signature -->
  <text x="148" y="215" class="timesig">4</text>
  <text x="148" y="268" class="timesig">4</text>

  <text x="72" y="255" style="font-family: 'Bravura', 'Noto Music', serif; font-size: 94px; fill: #111827;">&#x1D11E;</text>

