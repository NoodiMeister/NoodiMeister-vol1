    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#3b82f6" color="#3b82f6" transform="translate(0,140) scale(1.15) translate(-12,-12)"/>
  </g>
  <g transform="translate(640,0)">
    <line x1="0" y1="185" x2="0" y2="125" stroke="#111827" stroke-width="2"/>
    <ellipse cx="0" cy="185" rx="1.5" ry="1.5" fill="#111827"/>
    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#8b5cf6" color="#8b5cf6" transform="translate(0,125) scale(1.15) translate(-12,-12)"/>
  </g>

  <g transform="translate(800,0)">
    <line x1="0" y1="260" x2="0" y2="200" stroke="#111827" stroke-width="2"/>
    <ellipse cx="0" cy="260" rx="1.5" ry="1.5" fill="#111827"/>
    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#f97316" color="#f97316" transform="translate(0,200) scale(1.15) translate(-12,-12)"/>
