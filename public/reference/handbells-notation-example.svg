    <ellipse cx="0" cy="260" rx="1.5" ry="1.5" fill="#111827"/>
    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#ef4444" color="#ef4444" transform="translate(0,200) scale(1.15) translate(-12,-12)"/>
  </g>
  <g transform="translate(300,0)">
