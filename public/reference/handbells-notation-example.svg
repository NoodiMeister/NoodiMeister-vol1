    <use href="#handbell-note" xlink:href="#handbell-note" width="24" height="24" fill="#14b8a6" color="#14b8a6" transform="translate(0,170) scale(1.15) translate(-12,-12)"/>
  </g>
  <g transform="translate(940,0)">
