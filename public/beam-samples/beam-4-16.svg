<?xml version="1.0" encoding="UTF-8"?>
<!--
  Four sixteenth notes, one beat group: two parallel beams (16th-note level).
  Same visual language as 4/8 sample: Leland beamSpacing 0.25 sp, beamThickness 0.5 sp.
  Both beams equal thickness (SMuFL engraving default; not one fat + one thin).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <rect x="0" y="0" width="320" height="120" fill="#fafafa"/>
  <g stroke="#333" stroke-width="0.8" fill="none">
    <line x1="20" y1="50" x2="300" y2="50"/>
    <line x1="20" y1="60" x2="300" y2="60"/>
    <line x1="20" y1="70" x2="300" y2="70"/>
    <line x1="20" y1="80" x2="300" y2="80"/>
    <line x1="20" y1="90" x2="300" y2="90"/>
  </g>
  <text x="20" y="22" font-family="sans-serif" font-size="11" fill="#444">4/16: two equal beams (sixteenth note level)</text>
  <ellipse cx="65" cy="70" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="125" cy="70" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="185" cy="70" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="245" cy="70" rx="7" ry="5" fill="#1a1a1a"/>
  <!-- Stems to outer beam centerline -->
  <line x1="71" y1="70" x2="71" y2="20.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="butt"/>
  <line x1="131" y1="70" x2="131" y2="20.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="butt"/>
  <line x1="191" y1="70" x2="191" y2="20.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="butt"/>
  <line x1="251" y1="70" x2="251" y2="20.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="butt"/>
  <!-- Outer beam (16th): same stroke as inner -->
  <line x1="71" y1="20.5" x2="251" y2="20.5" stroke="#1a1a1a" stroke-width="5" stroke-linecap="butt"/>
  <!-- Primary beam (8th level): same thickness; centers spaced by thickness + gap (5 + 2.5) -->
  <line x1="71" y1="28" x2="251" y2="28" stroke="#1a1a1a" stroke-width="5" stroke-linecap="butt"/>
</svg>
