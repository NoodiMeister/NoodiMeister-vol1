<?xml version="1.0" encoding="UTF-8"?>
<!--
  1/8 + 1/16 + 1/16 (one beat), treble D4, stem UP.
  D4 space below E4: no ledger.
  Primary (8th) beam across three stems; partial 2/16 only between last two.
  Stems at centers 141, 208.5, 253.5 (stroke 1.8 -> outer x edges 140.1/141.9 etc.).
  Horizontal beam line: stroke widens in Y only, not X. Full beam x: 140.1-254.4 (stem1 left to stem3 right).
  Partial beam x: 207.6-254.4 (stem2 left to stem3 right). y: primary=50; 16th y2=52; secondary=56.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" width="360" height="140">
  <rect width="100%" height="100%" fill="#fafafa"/>

  <g stroke="#333" stroke-width="0.9" fill="none">
    <line x1="100" y1="48" x2="310" y2="48"/>
    <line x1="100" y1="56" x2="310" y2="56"/>
    <line x1="100" y1="64" x2="310" y2="64"/>
    <line x1="100" y1="72" x2="310" y2="72"/>
    <line x1="100" y1="80" x2="310" y2="80"/>
  </g>

  <g fill="none" stroke="#222" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 52 38 C 48 52 44 78 52 92 C 56 100 62 98 62 88 C 62 72 52 58 52 46 C 52 38 58 34 62 40 C 68 50 62 72 58 88 C 56 96 60 102 66 100 C 72 96 70 84 64 76"/>
  </g>
  <line x1="68" y1="42" x2="68" y2="98" stroke="#222" stroke-width="1"/>

  <!-- stem x=cx+6 (1.8); beam x spans stem outer edges (horizontal stroke does not extend in x) -->
  <g stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="butt" fill="none">
    <line x1="141" y1="84" x2="141" y2="50"/>
    <line x1="208.5" y1="84" x2="208.5" y2="52"/>
    <line x1="253.5" y1="84" x2="253.5" y2="52"/>
  </g>
  <g fill="#1a1a1a">
    <ellipse cx="135" cy="84" rx="6.5" ry="4.2"/>
    <ellipse cx="202.5" cy="84" rx="6.5" ry="4.2"/>
    <ellipse cx="247.5" cy="84" rx="6.5" ry="4.2"/>
  </g>

  <g stroke="#1a1a1a" stroke-linecap="butt" fill="none">
    <line x1="207.6" y1="56" x2="254.4" y2="56" stroke-width="4"/>
    <line x1="140.1" y1="50" x2="254.4" y2="50" stroke-width="4"/>
  </g>

  <text x="14" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#444">
    1/8 + 2x1/16, treble D4, stem up
  </text>
  <text x="14" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#666">
    Full 1/8 beam; partial 2/16; no ledger for D4 in this space
  </text>
</svg>
