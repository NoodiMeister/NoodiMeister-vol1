<?xml version="1.0" encoding="UTF-8"?>
<!--
  1/8 + 1/16 + 1/16 (one beat), stem down. Gould / SMuFL / MuseScore-classical:
  - Primary (eighth) beam: one straight segment from first stem x to last stem x. Its line is
    anchored like computeBeamGeometry: slope from default stem tips of outer notes (here same
    pitch ? horizontal). Only the 1/8 stem ends on this line.
  - Secondary (sixteenth) beam: parallel to primary, only between the two 1/16 stems (partial).
  - 1/16 stems extend through the primary to the secondary (outer) beam; their tips lie on
    the secondary, not on the primary.
  - sp = 8px ? stem length 3.5 sp = 28, beam 0.5 sp = 4, gap 0.25 sp = 2 (Leland-style).
  Paint order: partial secondary first (under), full primary last (on top).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 150" width="360" height="150">
  <rect width="100%" height="100%" fill="#fafafa"/>

  <g stroke="#333" stroke-width="0.9" fill="none">
    <line x1="100" y1="48" x2="310" y2="48"/>
    <line x1="100" y1="56" x2="310" y2="56"/>
    <line x1="100" y1="64" x2="310" y2="64"/>
    <line x1="100" y1="72" x2="310" y2="72"/>
    <line x1="100" y1="80" x2="310" y2="80"/>
  </g>

  <g fill="none" stroke="#222" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 52 38 C 48 52 44 78 52 92 C 56 100 62 98 62 88 C 62 72 52 58 52 46 C 52 38 58 34 62 40 C 68 50 62 72 58 88 C 56 96 60 102 66 100 C 72 96 70 84 64 76"/>
  </g>
  <line x1="68" y1="42" x2="68" y2="98" stroke="#222" stroke-width="1"/>

  <!-- D5 cy=56; centers 135, 202.5, 247.5; stem x = cx - 5.6 ? 129.4, 196.9, 241.9 -->
  <!-- Primary centerline y = cy + 3.5*sp = 56 + 28 = 84; secondary = 84 + (4+2) = 90 -->

  <g stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="butt" fill="none">
    <line x1="129.4" y1="56" x2="129.4" y2="84"/>
    <line x1="196.9" y1="56" x2="196.9" y2="90"/>
    <line x1="241.9" y1="56" x2="241.9" y2="90"/>
  </g>
  <g fill="#1a1a1a">
    <ellipse cx="135" cy="56" rx="6.5" ry="4.2"/>
    <ellipse cx="202.5" cy="56" rx="6.5" ry="4.2"/>
    <ellipse cx="247.5" cy="56" rx="6.5" ry="4.2"/>
  </g>

  <!-- 1) partial 16th beam (under)  2) full primary eighth (on top) -->
  <g stroke="#1a1a1a" stroke-linecap="butt" fill="none">
    <line x1="196.9" y1="90" x2="241.9" y2="90" stroke-width="4"/>
    <line x1="129.4" y1="84" x2="241.9" y2="84" stroke-width="4"/>
  </g>

  <text x="14" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#444">
    1/8+2/16: primary horizontal (1/8 tip only); 1/16 tips on partial secondary
  </text>
</svg>
