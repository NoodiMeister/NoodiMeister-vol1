<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" role="img" aria-label="Tin whistle D fingering samples">
  <rect width="900" height="720" fill="#ffffff"/>
  <text x="24" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111">Tin whistle (D) — written pitches</text>
  <text x="24" y="54" font-family="Arial, sans-serif" font-size="13" fill="#555">Codes bottom→top (near foot → mouthpiece); filled = covered. + = overblow second octave.</text>
  <text x="24" y="76" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#333">Fundamental register (low octave)</text>

  <!-- D4 -->
  <g transform="translate(24,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">D4 (111111)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#111"/><circle cx="22" cy="138" r="7" fill="#111"/>
  </g>
  <!-- E4 -->
  <g transform="translate(138,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">E4 (011111)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#111"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>
  <!-- F#4 -->
  <g transform="translate(252,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">F#4 (001111)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>
  <!-- G4 -->
  <g transform="translate(366,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">G4 (000111)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>
  <!-- A4 -->
  <g transform="translate(480,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">A4 (000011)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>
  <!-- B4 -->
  <g transform="translate(594,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">B4 (000001)</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="66" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>
  <!-- C5 -->
  <g transform="translate(708,92)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">C5 (000110)</text>
    <circle cx="22" cy="18" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>

  <!-- C#5 -->
  <g transform="translate(24,248)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">C#5 (000000)</text>
    <circle cx="22" cy="18" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="42" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="66" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
  </g>

  <text x="24" y="354" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#333">Overblow register (+)</text>

  <!-- D5+ -->
  <g transform="translate(24,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">D5 (111110) +</text>
    <circle cx="22" cy="18" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#111"/><circle cx="22" cy="138" r="7" fill="#111"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
  </g>
  <!-- E5+ -->
  <g transform="translate(138,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">E5 (011111) +</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#111"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
  </g>
  <!-- F#5+ -->
  <g transform="translate(252,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">F#5 (001111) +</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#111"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
  </g>
  <!-- G5+ -->
  <g transform="translate(366,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">G5 (000111) +</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#111"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
  </g>
  <!-- A5+ -->
  <g transform="translate(480,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">A5 (000011) +</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#111"/><circle cx="22" cy="66" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
  </g>
  <!-- B5+ -->
  <g transform="translate(594,412)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111">B5 (000001) +</text>
    <circle cx="22" cy="18" r="7" fill="#111"/><circle cx="22" cy="42" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="66" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="22" cy="90" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="114" r="7" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="22" cy="138" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="22" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">+</text>
