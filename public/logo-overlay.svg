<?xml version="1.0" encoding="UTF-8"?>
<!-- Overlay version: same as logo.svg, but WITHOUT 2D treble clef.
     The treble clef is rendered as real 3D via three.js on top of this. -->
<svg viewBox="0 0 1024 558" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Noodimeister">
  <defs>
    <linearGradient id="nmGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a8"/>
      <stop offset="36%" stop-color="#f2be59"/>
      <stop offset="72%" stop-color="#c6841f"/>
      <stop offset="100%" stop-color="#7a4a0b"/>
    </linearGradient>
    <linearGradient id="nmGoldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3c2"/>
      <stop offset="100%" stop-color="#b87418"/>
    </linearGradient>
    <filter id="nmShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.35"/>
    </filter>
    <filter id="nmClefShadow" x="-40%" y="-20%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#5f3705" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Staff lines -->
  <g stroke="#c88a2e" stroke-opacity="0.78" stroke-width="4.5" stroke-linecap="round">
    <line x1="120" y1="136" x2="904" y2="136"/>
    <line x1="120" y1="168" x2="904" y2="168"/>
    <line x1="120" y1="200" x2="904" y2="200"/>
    <line x1="120" y1="232" x2="904" y2="232"/>
    <line x1="120" y1="264" x2="904" y2="264"/>
  </g>

